<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Descargas</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 420px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #1e66ff;
            margin-top: 0;
        }

        p {
            color: #555;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .blue { background: #0d6efd; }
        .green { background: #198754; }
        .dark { background: #212529; }
    </style>
</head>
<body>

<div class="card">
    <h1>Centro de Descargas</h1>
    <p>Haz clic en los botones para obtener tus archivos PDF.</p>

    <a href="pdf/comandos.pdf" class="btn blue" download>
        COMANDOS BÁSICOS DE REACT
    </a>

    <a href="pdf/ieee.pdf" class="btn green" download>
        ISO / ESTÁNDAR IEEE
    </a>

    <a href="pdf/requerimientos.pdf" class="btn dark" download>
        REQUERIMIENTOS FUNCIONALES Y NO FUNCIONALES
    </a>

    <a href="pdf/sha256-python.pdf" class="btn dark" download>
        CÓDIGO PYTHON ALGORITMO SHA-256
    </a>

    <a href="./" class="btn dark">
        REGRESAR AL PROYECTO PRINCIPAL
    </a>
</div>

</body>
</html>
